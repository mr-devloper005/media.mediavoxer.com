<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer rounded square background -->
  <rect width="200" height="200" rx="36" fill="#0d2233"/>

  <!-- Steel blue accent arc top-right -->
  <circle cx="200" cy="0" r="110" fill="#78B3CE" opacity="0.12"/>

  <!-- Orange accent dot bottom-left -->
  <circle cx="0" cy="200" r="70" fill="#F96E2A" opacity="0.15"/>

  <!-- Signal / broadcast waves — left side -->
  <path d="M52 100 Q52 72 72 56" stroke="#78B3CE" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M40 100 Q40 62 68 42" stroke="#78B3CE" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Signal / broadcast waves — right side -->
  <path d="M148 100 Q148 72 128 56" stroke="#78B3CE" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  <path d="M160 100 Q160 62 132 42" stroke="#78B3CE" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Newspaper / document body -->
  <rect x="68" y="58" width="64" height="80" rx="8" fill="white"/>

  <!-- Orange header bar on newspaper -->
  <rect x="68" y="58" width="64" height="18" rx="8" fill="#F96E2A"/>
  <rect x="68" y="68" width="64" height="8" fill="#F96E2A"/>

  <!-- Text lines on newspaper -->
  <rect x="78" y="86" width="44" height="5" rx="2.5" fill="#C9E6F0"/>
  <rect x="78" y="96" width="36" height="5" rx="2.5" fill="#C9E6F0"/>
  <rect x="78" y="106" width="44" height="5" rx="2.5" fill="#C9E6F0"/>
  <rect x="78" y="116" width="28" height="5" rx="2.5" fill="#C9E6F0"/>

  <!-- Orange live dot on header -->
  <circle cx="104" cy="67" r="4" fill="white"/>

  <!-- Bottom orange bar -->
  <rect x="0" y="178" width="200" height="22" rx="0" fill="#F96E2A"/>
  <rect x="0" y="178" width="200" height="22" rx="36" fill="#F96E2A"/>
</svg>
