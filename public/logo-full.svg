<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" fill="none">
  <!-- ── Icon mark ── -->
  <rect width="56" height="56" rx="12" fill="#0d2233"/>
  <circle cx="52" cy="4" r="26" fill="#78B3CE" opacity="0.15"/>
  <!-- newspaper body -->
  <rect x="13" y="11" width="30" height="34" rx="4" fill="white"/>
  <!-- orange header -->
  <rect x="13" y="11" width="30" height="10" rx="4" fill="#F96E2A"/>
  <rect x="13" y="17" width="30" height="4" fill="#F96E2A"/>
  <!-- live dot -->
  <circle cx="28" cy="16" r="2.5" fill="white"/>
  <!-- content lines -->
  <rect x="18" y="27" width="20" height="3" rx="1.5" fill="#C9E6F0"/>
  <rect x="18" y="32.5" width="15" height="3" rx="1.5" fill="#C9E6F0"/>
  <rect x="18" y="38" width="20" height="3" rx="1.5" fill="#C9E6F0"/>
  <!-- signal arcs -->
  <path d="M9 28 Q9 19 15 14" stroke="#78B3CE" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <path d="M47 28 Q47 19 41 14" stroke="#78B3CE" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- bottom accent -->
  <rect x="13" y="48" width="30" height="3.5" rx="1.75" fill="#F96E2A"/>

  <!-- ── Wordmark ── -->
  <!-- "Media" -->
  <text x="72" y="26" font-family="system-ui, -apple-system, sans-serif" font-size="17" font-weight="900" fill="#0d2233" letter-spacing="-0.5">Media</text>
  <!-- "Mediavoxer" in steel blue -->
  <text x="72" y="46" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#78B3CE" letter-spacing="0.5">MEDIAVOXER</text>

  <!-- Orange dot accent after "Media" -->
  <circle cx="122" cy="22" r="3" fill="#F96E2A"/>
</svg>
